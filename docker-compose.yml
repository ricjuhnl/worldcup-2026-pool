services:
  server:
    build: ./server
    ports:
      - "3000:3000"
    volumes:
      - ./server/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=http://server:5173
    networks:
      - app-network
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      - VITE_API_URL=http://server:3000/api
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
